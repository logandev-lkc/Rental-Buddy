name: Verify Docs Sync

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify-docs-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rental-buddy-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: rental-buddy-web

      - name: Rebuild and sync docs output
        run: npm run deploy:gh
        working-directory: rental-buddy-web

      - name: Ensure docs is committed
        run: |
          if ! git diff --quiet -- docs; then
            echo "::error::docs/ 與目前程式碼不同步。請在本機執行：cd rental-buddy-web && npm run deploy:gh，然後提交 docs/ 變更。"
            echo ""
            echo "Changed files under docs/:"
            git status --short -- docs
            echo ""
            echo "Diff preview:"
            git diff -- docs
            exit 1
          fi
