name: Verify Docs Sync

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-docs-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rental-buddy-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: rental-buddy-web

      - name: Rebuild and sync docs output
        run: npm run deploy:gh
        working-directory: rental-buddy-web

      - name: Ensure docs is committed
        run: |
          if ! git diff --quiet -- docs; then
            echo "::error::docs/ 與目前程式碼不同步。請在本機執行：cd rental-buddy-web && npm run deploy:gh，然後提交 docs/ 變更。"
            echo ""
            echo "Changed files under docs/:"
            git status --short -- docs
            echo ""
            echo "Diff preview:"
            git diff -- docs
            exit 1
          fi

      - name: Comment on PR when docs sync fails
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require("node:child_process");
            let changedFiles = "";
            let diffPreview = "";
            try {
              changedFiles = execSync("git diff --name-only -- docs", { encoding: "utf8" }).trim();
            } catch {
              changedFiles = "";
            }
            try {
              diffPreview = execSync("git diff -- docs", { encoding: "utf8", maxBuffer: 1024 * 1024 }).trim();
            } catch {
              diffPreview = "";
            }
            const filesSection = changedFiles
              ? [
                  "",
                  "### docs/ 變更檔案",
                  "```",
                  changedFiles,
                  "```"
                ].join("\n")
              : "";
            const diffSection = diffPreview
              ? [
                  "",
                  "### docs/ 差異摘要（前 120 行）",
                  "```diff",
                  diffPreview.split("\n").slice(0, 120).join("\n"),
                  "```"
                ].join("\n")
              : "";

            const body = [
              "## docs/ 同步檢查失敗",
              "",
              "偵測到目前分支在執行 `npm run deploy:gh` 後，`docs/` 仍有未提交差異。",
              "",
              "請在本機執行：",
              "```bash",
              "cd rental-buddy-web",
              "npm run deploy:gh",
              "cd ..",
              "git add docs",
              "git commit -m \"deploy: sync docs output\"",
              "git push",
              "```",
              "",
              "完成後重新推送，CI 會自動重跑。",
              filesSection,
              diffSection
            ].join("\n");

            const marker = "<!-- docs-sync-check -->";
            const bodyWithMarker = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && typeof comment.body === "string" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: bodyWithMarker
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: bodyWithMarker
            });
